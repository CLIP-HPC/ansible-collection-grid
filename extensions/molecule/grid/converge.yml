---
- name: Converge
  hosts: all

  tasks:
    - name: "Include grid role"
      ansible.builtin.include_role:
        name: clip.grid.grid
      vars:
        grid_vos:
          - cms
          - alice
          - ops
          - belle
        grid_node_type: wn
        grid_fetchcrl_options:
          rcmode: noretrievalerrors
