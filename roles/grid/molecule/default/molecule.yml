---
dependency:
  name: galaxy
driver:
  name: podman
platforms:
  - name: molecule-rocky9-grid
    command: /usr/sbin/init
    image: quay.io/rockylinux/rockylinux:9-ubi-init
    pre_build_image: true
    cgroupns_mode: host
    capabilities:
      - SYS_ADMIN
    tmpfs:
      /tmp: rw
      /run: rw
    volumes:
      - /sys/fs/cgroup:/sys/fs/cgroup:rw
provisioner:
  name: ansible
scenario:
  name: default
verifier:
  name: ansible
